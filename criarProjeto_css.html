<style>
  :root{
    --card-border: #e5e7eb;
    --muted: #6b7280;
    --primary: #3b82f6;
    --bg-sub: #f9fafb;
  }

  body { background:#f3f4f6; font-family: Inter, system-ui, sans-serif; }

  .secao-btn{
    width:100%;
    background:#eef2f7;
    border:1px solid #d6dbe3;
    font-weight:600;
    padding:12px;
    border-radius:8px;
    text-align:left;
    cursor:pointer;
    margin-bottom:6px;
  }
  .secao-btn:hover{ background:#e0e6ef; }

  .secao{
    background:#fafafa;
    border:1px solid #e6e8ed;
    border-radius:8px;
    padding:20px;
    margin-bottom:15px;
    display:none;
  }

  .section-toolbar{
    display:flex; align-items:center; justify-content:space-between;
    gap:12px; margin-bottom:10px;
  }
  .section-toolbar h6{ margin:0; font-weight:700; color:#111827; }

  .bloco{
    padding:16px;
    border:1px solid var(--card-border);
    border-radius:10px;
    background:#fff;
    margin-bottom:18px;
  }

  .item-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 8px 0;
    border-bottom: 1px solid #e5e7eb;
  }

  .item-row:last-child {
    border-bottom: none;
  }

  .item-row .form-control,
  .item-row .form-select {
    min-width: 140px;
  }

  .item-row .btn-remove {
    background: none;
    border: none;
    color: #dc2626;
    font-size: 14px;
    padding: 4px 8px;
  }

  .item-row .btn-remove:hover {
    text-decoration: underline;
    cursor: pointer;
  }

  .item-row .title{
    margin-bottom:12px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    font-weight:600;
    color:#111827;
  }

  /* Checkboxes alinhadas */
  .check-group {
    display: flex;
    align-items: center;
    gap: 28px;
    height: 100%;
    margin-top: 0;
  }

  .check-inline {
    display: flex;
    align-items: center;
    gap: 6px;
    padding-top: 6px;
  }

  .form-label{
    font-size:.9rem;
    color:#111827;
    font-weight:600;
    margin-bottom:.35rem;
  }

  .btn-xs{ padding:.25rem .55rem; font-size:.75rem; line-height:1; border-radius:.35rem; }

  .btn-soft-primary{
    background:#e8efff; border:1px solid #c7d7fe; color:#1e40af;
  }
  .btn-soft-primary:hover{ background:#dbe7ff; color:#1e3a8a; }

  .btn-remove{
    background:#fee2e2; color:#b91c1c; border:1px solid #fca5a5;
    padding:2px 8px; font-size:.75rem; border-radius:6px;
  }
  .btn-remove:hover{ background:#fecaca; color:#7f1d1d; }

  .state-badge{
    display:inline-flex; align-items:center; gap:.4rem;
    padding:.35rem .7rem; border-radius:999px; font-weight:600;
  }
  .state-ok   { background: var(--bs-success-bg-subtle); color: var(--bs-success-text); }
  .state-off  { background: var(--bs-secondary-bg-subtle); color: var(--bs-secondary-text); }

  .state-badge .dot{ font-size:1rem; line-height:1; }

  .select-green {
    background-color: #e8f5e9 !important;
    border-color: #81c784 !important;
    color: #2e7d32 !important;
  }

  .select-red {
    background-color: #ffebee !important;
    border-color: #e57373 !important;
    color: #c62828 !important;
  }

  /* ========== VALIDAÇÃO DE CAMPOS ========== */
  .is-invalid {
    border-color: #dc2626 !important;
    background-color: #fef2f2 !important;
  }

  .is-invalid:focus {
    border-color: #dc2626 !important;
    box-shadow: 0 0 0 0.2rem rgba(220, 38, 38, 0.25) !important;
  }

  .invalid-feedback {
    display: none;
    color: #dc2626;
    font-size: 0.875rem;
    font-weight: 500;
    margin-top: 0.25rem;
  }

  .is-invalid ~ .invalid-feedback {
    display: block;
  }

  /* Asterisco vermelho para campos obrigatórios */
  .text-danger {
    color: #dc2626;
  }

  /* ========== CARD DE ERRO ========== */
.alert-card {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 16px 20px;
  border-radius: 12px;
  margin-bottom: 20px;
  animation: slideDown 0.3s ease-out;
  max-width: 100%;
}

.alert-danger {
  background: #fef2f2;
  border: 1px solid #fecaca;
  color: #991b1b;
}

.alert-icon {
  font-size: 24px;
  line-height: 1;
}

.alert-content {
  flex: 1;
}

.alert-content strong {
  display: block;
  font-size: 15px;
  font-weight: 700;
  margin-bottom: 4px;
  color: #7f1d1d;
}

.alert-content p {
  margin: 0;
  font-size: 14px;
  color: #991b1b;
}

.alert-close {
  background: none;
  border: none;
  font-size: 28px;
  line-height: 1;
  color: #991b1b;
  cursor: pointer;
  padding: 0;
  width: 24px;
  height: 24px;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0.7;
  transition: opacity 0.2s;
}

.alert-close:hover {
  opacity: 1;
}

@keyframes slideDown {
  from {
    opacity: 0;
    transform: translateY(-10px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

</style>
